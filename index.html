<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teleprompter Pro</title>

<style>
body {
    background: black;
    color: white;
    font-family: Arial;
    overflow: hidden;
}

textarea {
    width: 90%;
    height: 100px;
}

#tele {
    font-size: 40px;
    line-height: 1.8;
    width: 800px;
    margin: 50px auto;
}

.word {
    color: white;
    opacity: 0.3;
}

.done {
    color: gray;
    opacity: 1;
}
</style>
</head>
<body>

<textarea id="script"></textarea><br>
<button onclick="load()">Carregar</button>
<button onclick="start()">Falar</button>
<button onclick="stop()">Parar</button>

<div id="tele"></div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const socket = io();

let words = [];
let pos = 0;

// =====================
// SCRIPT
function load(){
    const text = document.getElementById("script").value;
    words = text.split(/\s+/);
    pos = 0;
    render();
    socket.emit("set_script", {script:text});
}

// =====================
// RENDER
function render(){
    let html = "";

    words.forEach((w,i)=>{
        let cls = "word";
        if(i < pos) cls += " done";

        html += `<span class="${cls}" id="w${i}">${w}</span> `;
    });

    document.getElementById("tele").innerHTML = html;

    scrollToCurrent();
}

// =====================
// SCROLL SUAVE
function scrollToCurrent(){
    const el = document.getElementById("w"+pos);
    if(!el) return;

    el.scrollIntoView({
        behavior: "smooth",
        block: "center"
    });
}

// =====================
// SOCKET
socket.on("update", d=>{
    pos = d.pos;
    render();
});

// =====================
// AUDIO
let ctx, proc, src, stream, rec=false;

function toPCM(f){
    let out = new Int16Array(f.length);
    for(let i=0;i<f.length;i++){
        out[i]=Math.max(-1,Math.min(1,f[i]))*32767;
    }
    return out;
}

async function start(){
    if(rec) return;
    rec = true;

    stream = await navigator.mediaDevices.getUserMedia({audio:true});
    ctx = new AudioContext({sampleRate:16000});

    src = ctx.createMediaStreamSource(stream);
    proc = ctx.createScriptProcessor(2048,1,1);

    proc.onaudioprocess = e=>{
        if(!rec) return;

        const pcm = toPCM(e.inputBuffer.getChannelData(0));
        socket.emit("audio", pcm.buffer);
    };

    src.connect(proc);
    proc.connect(ctx.destination);
}

function stop(){
    rec=false;
    proc.disconnect();
    src.disconnect();
    stream.getTracks().forEach(t=>t.stop());
    ctx.close();
}
</script>

</body>
</html>
